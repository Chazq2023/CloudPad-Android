name: Build APK Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Install CMake 3.30.4
        run: sdkmanager "cmake;3.30.4"

      - name: Install protoc and Python grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          python3 -m pip install grpcio-tools

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/pylux-android-cloud.apk

      - name: Create tag
        run: |
          TAG=auto-build-${GITHUB_RUN_NUMBER}
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Pylux Android Cloud ${{ env.TAG }}
          body: |
            ## Pylux Android Cloud Release

            ### Improvements
            - Added improved PS Plus entitlement matching
            - Added PPSA/CUSA fallback ownership detection
            - Improved cloud catalogue compatibility
            - Improved FF7 Rebirth ownership handling
            - Improved GTA V ownership detection

            ### Fixes
            - Fixed FF7 Rebirth launching demo instead of full game
            - Fixed multiple entitlement matching edge cases
            - Fixed RecyclerView stable ID crash while scrolling
            - Fixed GitHub Actions APK build pipeline
            - Fixed Android CI dependency installation issues

            ### CI/CD
            - Automatic APK generation on merge to master
            - Automatic GitHub release creation
            - Automatic release tagging
            - APK attached directly to releases

            ### APK
            Attached release asset:
            `pylux-android-cloud.apk`

          files: release/pylux-android-cloud.apk
