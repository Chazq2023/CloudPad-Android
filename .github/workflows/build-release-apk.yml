\f0\fs24 \cf0 name: Build APK Release\
\
on:\
  push:\
    branches:\
      - master\
\
permissions:\
  contents: write\
\
jobs:\
  build-release:\
    runs-on: ubuntu-latest\
\
    steps:\
      - uses: actions/checkout@v4\
\
      - name: Set up JDK 21\
        uses: actions/setup-java@v4\
        with:\
          distribution: temurin\
          java-version: 21\
\
      - name: Make Gradle executable\
        run: chmod +x ./gradlew\
\
      - name: Build debug APK\
        run: ./gradlew assembleDebug\
\
      - name: Rename APK\
        run: |\
          mkdir -p release\
          cp app/build/outputs/apk/debug/app-debug.apk release/pylux-cloud-android.apk\
\
      - name: Create release tag\
        run: |\
          TAG="auto-build-$\{GITHUB_RUN_NUMBER\}"\
          echo "TAG=$TAG" >> $GITHUB_ENV\
          git tag "$TAG"\
          git push origin "$TAG"\
\
      - name: Create GitHub release\
        uses: softprops/action-gh-release@v3\
        with:\
          tag_name: $\{\{ env.TAG \}\}\
          name: Pylux Cloud Android $\{\{ env.TAG \}\}\
          files: release/pylux-cloud-android-debug.apk}