name: Build APK Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Install CMake 3.30.4
        run: sdkmanager "cmake;3.30.4"

      - name: Install protoc and Python grpc tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          python3 -m pip install grpcio-tools

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/cloudpad-android.apk
          cp android/app/src/main/assets/FrontendArt/cloudpad-hero.png release/cloudpad-hero.png
          cp android/app/src/main/assets/FrontendArt/cloudpad-icon.png release/cloudpad-icon.png
          cp android/app/src/main/assets/FrontendArt/cloudpad-logo.png release/cloudpad-logo.png

      - name: Create tag
        run: |
          TAG=auto-build-${GITHUB_RUN_NUMBER}
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: CloudPad Android Cloud ${{ env.TAG }}
          body: |
            ## CloudPad Android Cloud Release

            ### Updates
            - Updated locale logic and PS3/PS4 entitlement logic.

            ### Outstanding Issues/Improvements
            - More games will show as you actually own them, however, these titles aren't part of the streaming library, so they will fail to launch, i need to fix this.

            ### Recommendations
            - Clear app cache and storage
            - Then uninstall the app and re-install new version

            ### APK
            Attached release asset:
            `cloudpad-android.apk`

          files: |
            release/cloudpad-android.apk
            release/cloudpad-hero.png
            release/cloudpad-icon.png
            release/cloudpad-logo.png
